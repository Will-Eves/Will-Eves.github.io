<!DOCTYPE html>
<html lang="en-us">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <title>Unity WebGL Player | Shooter Game</title>
    <script src="Build/UnityLoader.js"></script>
    <script>
      UnityLoader.instantiate("unityContainer", "Build/WebGL.json");
    </script>
    <style>
      body {
          margin: 0px;   
      }
      div {
          margin: 0px;   
      }
  </style>
  </head>
  <body>
    <div id="unityContainer" style="width: 100vw; height: 56.25vw; margin: auto"></div>
    <script>
      function openFullscreen(elem) {
        if (elem.requestFullscreen) {
          elem.requestFullscreen();
        } else if (elem.webkitRequestFullscreen) { /* Safari */
          elem.webkitRequestFullscreen();
        } else if (elem.msRequestFullscreen) { /* IE11 */
          elem.msRequestFullscreen();
        }
      }

      openFullscreen(document.getElementById("unityContainer"));
    </script>
  </body>
</html>
